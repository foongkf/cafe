<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FEONG的咖啡馆收藏集 | 现代简约</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f2efe7;
            font-family: 'Inter', sans-serif;
            color: #1f1c18;
            padding: 2.5rem 2rem;
            line-height: 1.4;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        /* 头部标题设计 */
        .header {
            margin-bottom: 2rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #c7a16b 0%, #e6c28f 40%, #b3804a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 12px rgba(199, 161, 107, 0.15);
            display: inline-block;
        }
        h1::after {
            content: "☕";
            font-size: 1.8rem;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #c7a16b;
            margin-left: 0.5rem;
            display: inline-block;
            vertical-align: middle;
            opacity: 0.8;
        }
        /* 搜索栏 */
        .search-bar {
            background: rgba(255,255,245,0.85);
            backdrop-filter: blur(2px);
            border-radius: 60px;
            padding: 0.4rem 1rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
            border: 1px solid #e7dfd1;
        }
        .search-input-group {
            flex: 3;
            min-width: 180px;
            display: flex;
            align-items: center;
            padding: 0.2rem 0.8rem;
        }
        .search-input-group i {
            color: #b48c5c;
            margin-right: 8px;
        }
        .search-input-group input {
            border: none;
            background: transparent;
            padding: 0.6rem 0;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }
        .filter-group select {
            width: 100%;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #e2d8ca;
            background: white;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .clear-filter {
            background: none;
            border: none;
            color: #9b8a72;
            cursor: pointer;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            transition: 0.2s;
        }
        .clear-filter:hover {
            background: #e5dbcf;
        }
        /* 表单卡片 */
        .form-card {
            background: #ffffffd9;
            border-radius: 32px;
            padding: 1.5rem 2rem;
            margin-bottom: 3rem;
            border: 1px solid #ece3d7;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }
        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }
        .input-group {
            flex: 1;
            min-width: 150px;
        }
        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #a28c70;
            margin-bottom: 0.3rem;
        }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #e2d6c8;
            border-radius: 24px;
            font-size: 0.85rem;
            background: #ffffff;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .input-group textarea {
            resize: vertical;
            min-height: 64px;
        }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            outline: none;
            border-color: #c5a26b;
            box-shadow: 0 0 0 2px rgba(197,162,107,0.2);
        }
        .btn-primary {
            background: #c7a16b;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: #b08854;
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #ddd2c2;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            color: #8b734f;
        }
        .btn-outline:hover {
            background: #f3ede5;
        }
        /* 分类区块 */
        .category-section {
            margin-bottom: 2.8rem;
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-left: 4px solid #cfb587;
            padding-left: 1rem;
            margin-bottom: 1.2rem;
        }
        .category-title {
            font-size: 1.6rem;
            font-weight: 500;
            color: #3b3328;
            cursor: pointer;
            transition: 0.2s;
        }
        .category-title:hover {
            color: #b88d54;
            transform: translateX(3px);
        }
        .view-all-btn {
            background: #f0e9e0;
            border: none;
            color: #ad8f6b;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
        }
        .view-all-btn:hover {
            background: #e4d9cd;
        }
        /* 横向滚动 */
        .scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 1.5rem;
            padding-bottom: 1rem;
            scrollbar-width: thin;
            scroll-behavior: smooth;
        }
        .scroll-container::-webkit-scrollbar {
            height: 4px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: #e3dbcf;
            border-radius: 4px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #cfb587;
            border-radius: 4px;
        }
        /* 卡片 */
        .card {
            background: #ffffff;
            border-radius: 28px;
            width: 290px;
            flex-shrink: 0;
            padding: 1.3rem;
            transition: all 0.25s ease;
            border: 1px solid #efe6db;
            box-shadow: 0 6px 12px -8px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1);
            border-color: #e2d2be;
        }
        .card-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #2a241e;
            padding-right: 40px;
        }
        .card-region {
            font-size: 0.7rem;
            color: #b48b54;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 0.6rem;
        }
        .card-desc {
            font-size: 0.75rem;
            line-height: 1.45;
            color: #6e6252;
            margin: 0.6rem 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-link {
            font-size: 0.75rem;
            color: #bc8f5a;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 0.3rem 0 0.9rem;
        }
        .card-link:hover {
            text-decoration: underline;
        }
        .no-link-text {
            font-size: 0.7rem;
            color: #c1b2a0;
            font-style: italic;
            margin: 0.3rem 0 0.9rem;
        }
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: auto;
            border-top: 1px solid #f1eadf;
            padding-top: 0.8rem;
        }
        .favorite-btn, .delete-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 40px;
        }
        .favorite-btn { color: #d4bb98; }
        .favorite-btn.active { color: #e2674b; }
        .delete-btn { color: #c6aa86; font-size: 1.2rem; }
        .delete-btn:hover { color: #b45a4a; }
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(30,27,22,0.4);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fffef8;
            border-radius: 36px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.8rem;
            border: 1px solid #f0e5d8;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #eee2d4;
            padding-bottom: 0.6rem;
        }
        .close-modal {
            font-size: 1.8rem;
            cursor: pointer;
            color: #a68d6e;
        }
        .small-card-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .small-card {
            background: #fefaf5;
            border-radius: 24px;
            padding: 0.9rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f0e3d6;
            cursor: pointer;
        }
        .small-card:hover {
            background: #fcf6ed;
        }
        .small-card-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }
        .small-card-meta {
            font-size: 0.7rem;
            color: #b2916e;
            display: flex;
            gap: 12px;
        }
        .small-fav {
            font-size: 1.3rem;
            background: none;
            border: none;
            cursor: pointer;
            color: #d1b588;
        }
        .small-fav.active { color: #e2674b; }
        .detail-modal .modal-content { max-width: 500px; }
        .detail-field { margin: 1rem 0; font-size: 0.9rem; }
        .detail-field strong {
            font-weight: 600;
            color: #5a4a36;
            display: inline-block;
            width: 70px;
        }
        .detail-link { color: #bc8a54; word-break: break-all; text-decoration: none; }
        .detail-link:hover { text-decoration: underline; }
        hr { margin: 1rem 0; border: 0; height: 1px; background: #ede2d5; }
        @media (max-width: 720px) {
            body { padding: 1.5rem; }
            .card { width: 260px; }
            .category-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>FEONG的咖啡馆收藏集</h1>
    </div>

    <div class="search-bar">
        <div class="search-input-group">
            <i class="fas fa-search"></i>
            <input type="text" id="searchKeyword" placeholder="搜索名称、地区或简介...">
        </div>
        <div class="filter-group">
            <select id="regionFilter">
                <option value="">🌍 所有地区</option>
            </select>
        </div>
        <button class="clear-filter" id="clearFiltersBtn"><i class="fas fa-eraser"></i> 清除</button>
    </div>

    <div class="form-card">
        <div class="form-grid">
            <div class="input-group">
                <label>咖啡厅名称 *</label>
                <input type="text" id="cafeName" autocomplete="off">
            </div>
            <div class="input-group">
                <label>地区</label>
                <input type="text" id="cafeRegion" autocomplete="off">
            </div>
            <div class="input-group">
                <label>链接</label>
                <input type="url" id="cafeUrl" placeholder="https://..." autocomplete="off">
            </div>
            <div class="input-group">
                <label>分类</label>
                <select id="cafeCategory"></select>
            </div>
            <div class="input-group" style="min-width: 200px; flex:2;">
                <label>简介</label>
                <textarea id="cafeDesc" rows="2"></textarea>
            </div>
            <button class="btn-primary" id="addCafeBtn"><i class="fas fa-plus-circle"></i> 加入收藏</button>
        </div>
    </div>

    <div id="categoriesContainer"></div>
</div>

<!-- 模态框 -->
<div id="categoryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalCategoryTitle">分类名称</h2>
            <span class="close-modal" id="closeModalBtn">&times;</span>
        </div>
        <div id="modalSmallCardList" class="small-card-list">加载中...</div>
    </div>
</div>

<div id="detailModal" class="modal detail-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📄 咖啡馆档案</h2>
            <span class="close-modal" id="closeDetailModalBtn">&times;</span>
        </div>
        <div id="detailContent"></div>
    </div>
</div>

<script>
    // ==================== Firebase 配置 ====================
    const firebaseConfig = {
        apiKey: "AIzaSyA3sD8nLU9-4QOuS4ZFIuUXMn_yilFr5Oc",
        authDomain: "cafe-c55f9.firebaseapp.com",
        databaseURL: "https://cafe-c55f9-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "cafe-c55f9",
        storageBucket: "cafe-c55f9.firebasestorage.app",
        messagingSenderId: "328042543743",
        appId: "1:328042543743:web:0fc175a3aadc7c5a639d4a"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const cafesRef = database.ref("cafes");

    /**
     * 🔒 重要安全提示：
     * 请在 Firebase 控制台 -> Realtime Database -> 规则 中设置合适的权限。
     * 推荐开发测试阶段使用：
     * {
     *   "rules": {
     *     ".read": true,
     *     ".write": true
     *   }
     * }
     * 生产环境建议启用身份验证并限制写入范围，例如：
     * ".write": "auth != null"
     */

    // ==================== 全局变量 ====================
    let allCafes = [];
    let globalCategories = [];
    let currentModalCategory = null;
    let searchKeyword = "";
    let selectedRegion = "";
    let regionSet = new Set();
    let searchDebounceTimer = null;

    const DEFAULT_CATEGORIES = ["Bar", "Cafe", "Chinese", "Dessert", "Fine Dine", "Hatyai", "Japanese", "Kopitiam", "Korean", "Nyonya", "Thai", "Western", "Others"];

    // 辅助函数：HTML 转义（防 XSS）
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 链接严格校验：只允许 http/https 或空
    function isValidUrl(url) {
        if (!url.trim()) return true;
        return /^https?:\/\/.+/.test(url.trim());
    }

    // 计算全局分类
    function computeGlobalCategories() {
        let catsSet = new Set(DEFAULT_CATEGORIES);
        allCafes.forEach(cafe => { if (cafe.category) catsSet.add(cafe.category); });
        globalCategories = [...catsSet].sort((a, b) => {
            let aIdx = DEFAULT_CATEGORIES.indexOf(a);
            let bIdx = DEFAULT_CATEGORIES.indexOf(b);
            if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
            if (aIdx !== -1) return -1;
            if (bIdx !== -1) return 1;
            return a.localeCompare(b);
        });
        return globalCategories;
    }

    // 更新地区筛选下拉框
    function updateRegionFilterDropdown() {
        regionSet.clear();
        allCafes.forEach(cafe => {
            if (cafe.region && cafe.region.trim() !== "") regionSet.add(cafe.region.trim());
        });
        const select = document.getElementById("regionFilter");
        const currentVal = select.value;
        select.innerHTML = '<option value="">🌍 所有地区</option>';
        Array.from(regionSet).sort().forEach(region => {
            const option = document.createElement("option");
            option.value = region;
            option.textContent = region;
            select.appendChild(option);
        });
        if (currentVal && regionSet.has(currentVal)) select.value = currentVal;
        else select.value = "";
        selectedRegion = select.value;
    }

    // 获取筛选后的咖啡馆
    function getFilteredCafes() {
        let filtered = [...allCafes];
        if (searchKeyword.trim() !== "") {
            const kw = searchKeyword.trim().toLowerCase();
            filtered = filtered.filter(cafe =>
                cafe.name.toLowerCase().includes(kw) ||
                (cafe.region && cafe.region.toLowerCase().includes(kw)) ||
                (cafe.description && cafe.description.toLowerCase().includes(kw))
            );
        }
        if (selectedRegion && selectedRegion !== "") {
            filtered = filtered.filter(cafe => cafe.region === selectedRegion);
        }
        return filtered;
    }

    // 渲染主视图
    function renderMainView() {
        const container = document.getElementById("categoriesContainer");
        if (!container) return;
        container.innerHTML = "";
        const filteredCafes = getFilteredCafes();
        const grouped = new Map();
        globalCategories.forEach(cat => { grouped.set(cat, []); });
        filteredCafes.forEach(cafe => {
            const cat = cafe.category;
            if (grouped.has(cat)) grouped.get(cat).push(cafe);
            else grouped.set(cat, [cafe]);
        });
        for (let category of globalCategories) {
            const cafesInCat = grouped.get(category) || [];
            if (cafesInCat.length === 0) continue;
            const sectionDiv = document.createElement("div");
            sectionDiv.className = "category-section";
            sectionDiv.innerHTML = `
                <div class="category-header">
                    <div class="category-title" data-cat="${category}">${escapeHtml(category)}</div>
                    <button class="view-all-btn" data-cat="${category}">📋 全部 (${cafesInCat.length})</button>
                </div>
                <div class="scroll-container" id="scroll-${category.replace(/[^a-zA-Z0-9]/g, '_')}"></div>
            `;
            container.appendChild(sectionDiv);
            const scrollDiv = sectionDiv.querySelector(".scroll-container");
            cafesInCat.forEach(cafe => {
                const card = createCardElement(cafe);
                scrollDiv.appendChild(card);
            });
            const titleDiv = sectionDiv.querySelector(".category-title");
            const viewBtn = sectionDiv.querySelector(".view-all-btn");
            const openModalFunc = () => openCategoryModal(category);
            titleDiv.addEventListener("click", openModalFunc);
            viewBtn.addEventListener("click", openModalFunc);
        }
        if (container.children.length === 0) {
            container.innerHTML = `<div style="padding:2rem; text-align:center; background:#fef7ef; border-radius:36px;">🔍 没有找到匹配的咖啡厅，试试其他关键词～</div>`;
        }
        if (currentModalCategory) {
            openCategoryModal(currentModalCategory);
        }
    }

    // 创建卡片 DOM
    function createCardElement(cafe) {
        const cardDiv = document.createElement("div");
        cardDiv.className = "card";
        const isFav = cafe.favorited === true;
        const regionHtml = cafe.region ? `<div class="card-region"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(cafe.region)}</div>` : '';
        const descHtml = cafe.description ? `<div class="card-desc">${escapeHtml(cafe.description.length > 80 ? cafe.description.substring(0, 77) + '...' : cafe.description)}</div>` : '';
        let linkHtml = '';
        if (cafe.url && cafe.url.trim() !== "") {
            linkHtml = `<a href="${escapeHtml(cafe.url)}" target="_blank" class="card-link"><i class="fas fa-external-link-alt"></i> 🔗链接</a>`;
        } else {
            linkHtml = `<div class="no-link-text"><i class="fas fa-link-slash"></i> 未提供链接</div>`;
        }
        cardDiv.innerHTML = `
            <div class="card-name">${escapeHtml(cafe.name)}</div>
            ${regionHtml}
            ${descHtml}
            ${linkHtml}
            <div class="card-actions">
                <button class="favorite-btn ${isFav ? 'active' : ''}" data-id="${cafe.id}"><i class="fas fa-heart"></i></button>
                <button class="delete-btn" data-id="${cafe.id}"><i class="fas fa-trash-alt"></i></button>
            </div>
        `;
        const favBtn = cardDiv.querySelector(".favorite-btn");
        const delBtn = cardDiv.querySelector(".delete-btn");
        favBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleFavorite(cafe.id, !cafe.favorited);
        });
        delBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if (confirm(`移除「${cafe.name}」吗？`)) deleteCafe(cafe.id);
        });
        return cardDiv;
    }

    // 收藏切换
    async function toggleFavorite(id, newState) {
        await cafesRef.child(id).update({ favorited: newState });
    }

    // 删除咖啡馆
    async function deleteCafe(id) {
        await cafesRef.child(id).remove();
    }

    // 添加新咖啡馆（链接校验强化）
    async function addCafe(name, url, category, region, description) {
        if (!name.trim()) { alert("请填写咖啡厅名称"); return false; }
        if (!isValidUrl(url)) {
            alert("链接格式无效，仅支持 http:// 或 https:// 开头的网址，或留空");
            return false;
        }
        const finalUrl = url.trim();
        const newCafe = {
            name: name.trim(),
            url: finalUrl || "",
            category: category,
            favorited: false,
            region: region.trim() || "",
            description: description.trim() || "",
            createdAt: Date.now()
        };
        await cafesRef.push(newCafe);
        return true;
    }

    // 渲染分类下拉框
    function renderCategorySelect() {
        const select = document.getElementById("cafeCategory");
        if (!select) return;
        select.innerHTML = "";
        globalCategories.forEach(cat => {
            const option = document.createElement("option");
            option.value = cat;
            option.textContent = cat;
            select.appendChild(option);
        });
    }

    // 打开分类模态框
    function openCategoryModal(category) {
        currentModalCategory = category;
        const modal = document.getElementById("categoryModal");
        const modalTitle = document.getElementById("modalCategoryTitle");
        const listContainer = document.getElementById("modalSmallCardList");
        modalTitle.innerText = `📌 ${category} · 全部咖啡馆`;
        const cafesInCat = allCafes.filter(c => c.category === category);
        if (cafesInCat.length === 0) {
            listContainer.innerHTML = `<div style="padding:2rem;text-align:center">✨ 暂无咖啡馆</div>`;
        } else {
            listContainer.innerHTML = "";
            cafesInCat.forEach(cafe => {
                listContainer.appendChild(createSmallCardElement(cafe));
            });
        }
        modal.style.display = "flex";
    }

    // 小卡片
    function createSmallCardElement(cafe) {
        const div = document.createElement("div");
        div.className = "small-card";
        const isFav = cafe.favorited === true;
        div.innerHTML = `
            <div class="small-card-info">
                <div class="small-card-name">${escapeHtml(cafe.name)}</div>
                <div class="small-card-meta">
                    ${cafe.region ? `<span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(cafe.region)}</span>` : ''}
                    <span><i class="fas fa-tag"></i> ${escapeHtml(cafe.category)}</span>
                </div>
            </div>
            <div class="small-card-actions">
                <button class="small-fav ${isFav ? 'active' : ''}" data-id="${cafe.id}"><i class="fas fa-heart"></i></button>
            </div>
        `;
        const infoArea = div.querySelector(".small-card-info");
        infoArea.style.cursor = "pointer";
        infoArea.addEventListener("click", (e) => {
            e.stopPropagation();
            showDetailModal(cafe);
        });
        const favSmallBtn = div.querySelector(".small-fav");
        favSmallBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleFavorite(cafe.id, !cafe.favorited);
        });
        return div;
    }

    // 详情模态框
    function showDetailModal(cafe) {
        const modal = document.getElementById("detailModal");
        const detailContainer = document.getElementById("detailContent");
        const isFav = cafe.favorited === true;
        const linkDisplay = (cafe.url && cafe.url.trim()) ? `<a href="${escapeHtml(cafe.url)}" target="_blank" class="detail-link">${escapeHtml(cafe.url)}</a>` : '<span style="color:#b5a084;">未提供链接</span>';
        detailContainer.innerHTML = `
            <div class="detail-field"><strong>名称</strong><br>${escapeHtml(cafe.name)}</div>
            <div class="detail-field"><strong>地区</strong><br>${cafe.region ? escapeHtml(cafe.region) : '未填写'}</div>
            <div class="detail-field"><strong>分类</strong><br>${escapeHtml(cafe.category)}</div>
            <div class="detail-field"><strong>简介</strong><br>${cafe.description ? escapeHtml(cafe.description) : '暂无简介'}</div>
            <div class="detail-field"><strong>链接</strong><br>${linkDisplay}</div>
            <div class="detail-field"><strong>收藏</strong><br>${isFav ? '已收藏 ❤️' : '未收藏'}</div>
            <hr>
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button id="detailFavBtn" class="btn-outline"><i class="fas fa-heart"></i> ${isFav ? '取消收藏' : '收藏'}</button>
                <button id="detailDelBtn" class="btn-outline" style="color:#b1624b;"><i class="fas fa-trash-alt"></i> 移除</button>
            </div>
        `;
        modal.style.display = "flex";
        document.getElementById("detailFavBtn").addEventListener("click", () => {
            toggleFavorite(cafe.id, !cafe.favorited);
            modal.style.display = "none";
        });
        document.getElementById("detailDelBtn").addEventListener("click", () => {
            if (confirm(`永久删除「${cafe.name}」？`)) {
                deleteCafe(cafe.id);
                modal.style.display = "none";
            }
        });
    }

    // Firebase 实时监听
    function subscribeCafes() {
        cafesRef.on("value", (snapshot) => {
            const data = snapshot.val();
            const cafesArray = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    cafesArray.push({
                        id: key,
                        name: item.name || "未命名",
                        url: item.url || "",
                        category: item.category || "Others",
                        favorited: item.favorited === true,
                        region: item.region || "",
                        description: item.description || ""
                    });
                });
            }
            allCafes = cafesArray;
            computeGlobalCategories();
            updateRegionFilterDropdown();
            renderCategorySelect();
            renderMainView();
        });
    }

    // 示例数据（仅首次）
    async function seedExampleData() {
        const snapshot = await cafesRef.once("value");
        if (snapshot.exists()) return;
        const examples = [
            { name: "蓝瓶咖啡", url: "https://bluebottlecoffee.com", category: "Cafe", favorited: true, region: "东京·涩谷", description: "精品咖啡领航者，手冲与冷萃闻名，极简美学空间。" },
            { name: "福来甜品屋", url: "", category: "Dessert", favorited: false, region: "槟城", description: "传统马来甜点+创意西式蛋糕，椰糖系列必尝。" },
            { name: "槟城娘惹餐厅", url: "https://example.com/nyonya", category: "Nyonya", favorited: true, region: "槟城乔治市", description: "正宗娘惹菜，叻沙与小金杯，复古峇峇娘惹装潢。" },
            { name: "合艾泰式咖啡", url: "", category: "Hatyai", favorited: false, region: "合艾", description: "泰南风味咖啡，搭配斑斓甜品，悠闲度假氛围。" },
            { name: "喫茶 夜雾", url: "https://example.com/japanese", category: "Japanese", favorited: true, region: "京都", description: "日式深烘，昭和复古喫茶店，布丁与拿铁绝配。" },
            { name: "老南洋 Kopitiam", url: "", category: "Kopitiam", favorited: false, region: "吉隆坡茨厂街", description: "传统海南咖啡、咖椰吐司，半熟蛋，地道南洋早餐。" }
        ];
        for (let ex of examples) {
            await cafesRef.push(ex);
        }
    }

    // 搜索防抖
    function bindSearchEvents() {
        const searchInput = document.getElementById("searchKeyword");
        const regionSelect = document.getElementById("regionFilter");
        const clearBtn = document.getElementById("clearFiltersBtn");
        const performSearch = () => {
            searchKeyword = searchInput.value;
            selectedRegion = regionSelect.value;
            renderMainView();
        };
        const debouncedSearch = () => {
            if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(performSearch, 300);
        };
        searchInput.addEventListener("input", debouncedSearch);
        regionSelect.addEventListener("change", performSearch);
        clearBtn.addEventListener("click", () => {
            searchInput.value = "";
            regionSelect.value = "";
            searchKeyword = "";
            selectedRegion = "";
            renderMainView();
        });
    }

    // 其他事件绑定
    function bindEvents() {
        document.getElementById("addCafeBtn").addEventListener("click", async () => {
            const name = document.getElementById("cafeName").value;
            const url = document.getElementById("cafeUrl").value;
            const category = document.getElementById("cafeCategory").value;
            const region = document.getElementById("cafeRegion").value;
            const description = document.getElementById("cafeDesc").value;
            await addCafe(name, url, category, region, description);
            document.getElementById("cafeName").value = "";
            document.getElementById("cafeRegion").value = "";
            document.getElementById("cafeUrl").value = "";
            document.getElementById("cafeDesc").value = "";
        });
        const modal = document.getElementById("categoryModal");
        const closeModal = document.getElementById("closeModalBtn");
        const detailModal = document.getElementById("detailModal");
        const closeDetail = document.getElementById("closeDetailModalBtn");
        closeModal.onclick = () => { modal.style.display = "none"; currentModalCategory = null; };
        closeDetail.onclick = () => { detailModal.style.display = "none"; };
        window.onclick = (e) => {
            if (e.target === modal) { modal.style.display = "none"; currentModalCategory = null; }
            if (e.target === detailModal) detailModal.style.display = "none";
        };
    }

    // 初始化
    async function init() {
        computeGlobalCategories();
        renderCategorySelect();
        bindEvents();
        bindSearchEvents();
        await seedExampleData();
        subscribeCafes();
    }
    init();
</script>
</body>
</html>
