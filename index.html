<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FEONG的咖啡厅收藏集 · 公共云端</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        /* 样式保持不变（与之前相同，此处省略以避免过长，实际使用时请保留完整样式） */
        * {

            padding: 0;

            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;

        body {

            color: #2e241f;

        }
        .container {
            max-width: 1600px;

        .header h1 {

        }
        .form-card {
            background: white;

        }
        .form-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4a2e22;
        }
        .form-title::before {
            content: "☕";
            font-size: 1.6rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-weight: 500;
            font-size: 0.85rem;
            color: #5b3e2e;
        }
        .input-group input, 
        .input-group textarea,
        .input-group select {
            padding: 12px 14px;
            border: 1.5px solid #eeddcb;
            border-radius: 24px;
            font-size: 0.9rem;
            background-color: #fffef7;
        }
        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            outline: none;
            border-color: #c28a6b;

        }
        .form-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            justify-content: flex-end;
        }
        button {
            background: #5e3c2c;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;

        }
        button:hover {

        }

        }
        .btn-secondary:hover {

        }
        .btn-fav-active {
            background: #c28a6b;

        }
        .search-bar {
            background: #fefaf7;
            border-radius: 28px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.8rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            border: 1px solid #f0e2d6;
        }
        .search-group {
            flex: 2;

        }
        .search-group label {

        .search-group input, .search-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #eeddcb;
            border-radius: 40px;
            font-size: 0.85rem;
            background: white;
        }
        .clear-search {
            background: #e9dbcf;
            color: #5b3e2e;
            padding: 8px 18px;
            font-size: 0.75rem;

        }
        .clear-search:hover {
            background: #d9c2ae;
            transform: none;
        }
        .categories-container {
            display: flex;
            flex-direction: column;
            gap: 2.2rem;
        }
        .category-section {
            background: #fefaf7;
            border-radius: 28px;
            padding: 1rem 0 1rem 1rem;
        }
        .category-header {
            display: flex;
            align-items: baseline;
            gap: 12px;

        .category-header:hover {

        .category-title {

        .category-count {

        .cards-scroll {

            padding-right: 1rem;

        .cards-scroll::-webkit-scrollbar {

        }
        .cards-scroll::-webkit-scrollbar-track {

        .cards-scroll::-webkit-scrollbar-thumb {

        .cafe-card {

        .cafe-name {

            display: flex;

        .cafe-name span {

        .cafe-desc {

            margin-bottom: 12px;

            -webkit-box-orient: vertical;

        .cafe-website {

            margin-bottom: 12px;

            background: #fef7f0;
            padding: 6px 8px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .cafe-website a {
            color: #b1624b;

            font-weight: 500;
            border-bottom: 1px solid #e2cbbd;
        }
        .no-link {
            color: #ab8a72;
            font-style: italic;
        }
        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem 1rem 1rem;
            gap: 8px;
        }
        .favorite-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 40px;
            color: #ab7b60;
            width: 36px;
        }
        .favorite-btn.active {

        }
        .delete-btn {
            background: none;
            border: 1px solid #e5cfbf;
            color: #a56547;
            padding: 5px 12px;
            font-size: 0.7rem;
            border-radius: 60px;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            background: #fffaf5;
            border-radius: 48px;
            color: #ab8a72;
        }
        .sync-status {
            background: #e9dfd7;
            border-radius: 24px;
            padding: 0.6rem 1.2rem;
            margin-bottom: 1.5rem;
            font-size: 0.75rem;
            color: #4f3929;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .online-badge {
            background: #6b8c5c;
            color: white;
            padding: 2px 12px;
            border-radius: 30px;
        }
        .offline-badge {
            background: #b1624b;
            color: white;
            padding: 2px 12px;
            border-radius: 30px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fffef7;
            border-radius: 40px;
            max-width: 90%;
            width: 600px;
            max-height: 85%;
            overflow-y: auto;

            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #eeddcb;

            justify-content: space-between;
            align-items: center;
            background: #fff4ec;
            border-radius: 40px 40px 0 0;
        }
        .close-modal {
            background: none;
            font-size: 1.8rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8b694f;
        }
        .modal-body {
            padding: 1.2rem 1.5rem;
        }
        .list-item {
            background: white;
            border: 1px solid #f0e2d6;
            border-radius: 24px;
            padding: 0.8rem 1rem;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .list-item:hover {
            background: #fef7f0;
            transform: translateX(4px);
        }
        .list-item-info {
            flex: 1;
        }
        .list-item-name {
            font-weight: 700;
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .list-item-cat {
            background: #f1e2d6;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 40px;
        }
        .list-item-addr {
            font-size: 0.7rem;
            color: #9b7a64;
            margin-top: 4px;
        }
        .list-item-fav {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 8px;
            color: #ab7b60;
        }
        .list-item-fav.active {
            color: #e2554d;
        }
        .detail-card .cafe-name {
            font-size: 1.4rem;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #ad8f78;
        }
        @media (max-width: 620px) {
            body { padding: 1rem; }
            .cafe-card { width: 260px; }
            .category-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>☕ FEONG的咖啡厅收藏集</h1>
        <p></p>
    </div>
    <div class="sync-status">
        <span>🌍 公共数据池 · 所有人实时共享</span>
        <span id="syncIndicator" class="online-badge">🟢 已连接</span>
    </div>
    <div class="search-bar">
        <div class="search-group" style="flex: 3;">
            <label>🔍 关键词搜索 (名称/地址/描述)</label>
            <input type="text" id="searchKeyword" placeholder="输入咖啡馆名称、地址或描述..." autocomplete="off">
        </div>
        <div class="search-group">
            <label>📍 地区筛选</label>
            <select id="searchRegion">
                <option value="">所有地区</option>
            </select>
        </div>
        <button id="clearSearchBtn" class="clear-search">✖️ 清除筛选</button>
    </div>
    <div class="form-card">
        <div class="form-title">录入新发现</div>
        <div class="form-grid">
            <div class="input-group">
                <label>咖啡馆名称 *</label>
                <input type="text" id="cafeName" placeholder="例: 小森林咖啡" autocomplete="off">
            </div>
            <div class="input-group">
                <label>地址 / 区域</label>
                <input type="text" id="cafeAddress" placeholder="街道, 城市">
            </div>
            <div class="input-group">
                <label>官网链接 (URL)</label>
                <input type="url" id="cafeWebsite" placeholder="https://www.cafe-example.com">
            </div>
            <div class="input-group">
                <label>类别 * (支持自定义)</label>
                <input list="categoryOptions" id="cafeCategory" placeholder="选择或输入新类别" autocomplete="off">
                <datalist id="categoryOptions">
                    <option value="Bar"> <option value="Cafe"> <option value="Chinese"> <option value="Dessert">
                    <option value="Fine Dine"> <option value="Hatyai"> <option value="Japanese"> <option value="Kopitiam">
                    <option value="Korean"> <option value="Nyonya"> <option value="Thai"> <option value="Western"> <option value="Others">
                </datalist>
            </div>
            <div class="input-group">
                <label>简短描述</label>
                <textarea id="cafeDesc" rows="2" placeholder="手冲出色 / 安静角落 / 适合办公..."></textarea>
            </div>
        </div>
        <div class="form-actions">
            <button id="addBtn">➕ 添加咖啡馆</button>
        </div>
    </div>
    <div id="categoriesContainer" class="categories-container"></div>
    <footer>☕ 点击分类标题 → 纵向列表模式 · 点击列表项查看完整详情</footer>
</div>
<div id="listModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="listModalTitle">分类名称</h2>
            <button class="close-modal" id="closeListModal">&times;</button>
        </div>
        <div id="listModalBody" class="modal-body"></div>
    </div>
</div>
<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📄 咖啡馆详情</h2>
            <button class="close-modal" id="closeDetailModal">&times;</button>
        </div>
        <div id="detailModalBody" class="modal-body"></div>
    </div>
</div>

<script>
    // ==================== Firebase 配置（请替换为您的项目配置） ====================
    const firebaseConfig = {
        apiKey: "AIzaSyA3sD8nLU9-4QOuS4ZFIuUXMn_yilFr5Oc",
        authDomain: "cafe-c55f9.firebaseapp.com",
        databaseURL: "https://cafe-c55f9-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "cafe-c55f9",
        storageBucket: "cafe-c55f9.firebasestorage.app",
        messagingSenderId: "328042543743",
        appId: "1:328042543743:web:0fc175a3aadc7c5a639d4a"
    };
    // ========================================================================

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let cafes = [];
    let showOnlyFavorites = false;
    let currentListCategory = "";
    let searchKeyword = "";
    let searchRegion = "";

    // DOM 元素
    const categoriesContainer = document.getElementById('categoriesContainer');
    const addBtn = document.getElementById('addBtn');
    const nameInput = document.getElementById('cafeName');
    const addressInput = document.getElementById('cafeAddress');
    const websiteInput = document.getElementById('cafeWebsite');
    const categoryInput = document.getElementById('cafeCategory');
    const descInput = document.getElementById('cafeDesc');
    const toggleFavBtn = document.getElementById('toggleFavBtn');
    const listModal = document.getElementById('listModal');
    const detailModal = document.getElementById('detailModal');
    const closeListModal = document.getElementById('closeListModal');
    const closeDetailModal = document.getElementById('closeDetailModal');
    const listModalTitle = document.getElementById('listModalTitle');
    const listModalBody = document.getElementById('listModalBody');
    const detailModalBody = document.getElementById('detailModalBody');
    const searchKeywordInput = document.getElementById('searchKeyword');
    const searchRegionSelect = document.getElementById('searchRegion');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const syncIndicator = document.getElementById('syncIndicator');

    function generateId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 8); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function sanitizeUrl(url) {
        if (!url) return null;
        let u = url.trim();
        if (!u) return null;
        if (u.startsWith('http://') || u.startsWith('https://')) return u;
        if (/^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}(:\d+)?(\/.*)?$/.test(u)) return 'https://' + u;
        return null;
    }

    function updateRegionOptions() {
        const regions = new Set();
        cafes.forEach(cafe => {
            if (cafe.address && cafe.address.trim()) {
                let region = cafe.address.trim();
                if (region.length > 20) region = region.substring(0, 20) + '...';
                regions.add(region);
            }
        });
        const currentVal = searchRegionSelect.value;
        searchRegionSelect.innerHTML = '<option value="">所有地区</option>';
        Array.from(regions).sort().forEach(region => {
            const option = document.createElement('option');
            option.value = region;
            option.textContent = region;
            searchRegionSelect.appendChild(option);
        });
        if (currentVal && regions.has(currentVal)) searchRegionSelect.value = currentVal;
        else searchRegionSelect.value = "";
    }

    function filterCafes(cafesList) {
        let filtered = [...cafesList];
        if (showOnlyFavorites) filtered = filtered.filter(c => c.favorite);
        if (searchKeyword.trim()) {
            const kw = searchKeyword.trim().toLowerCase();
            filtered = filtered.filter(c => 
                c.name.toLowerCase().includes(kw) ||
                (c.address && c.address.toLowerCase().includes(kw)) ||
                (c.description && c.description.toLowerCase().includes(kw))
            );
        }
        if (searchRegion) {
            filtered = filtered.filter(c => c.address && (c.address.includes(searchRegion) || searchRegion.includes(c.address)));
        }
        return filtered;
    }

    function renderGroupedCards() {
        if (!categoriesContainer) return;
        let filtered = filterCafes(cafes);
        if (filtered.length === 0) {
            categoriesContainer.innerHTML = `<div class="empty-state">✨ 没有找到符合条件的咖啡馆 ✨</div>`;
            return;
        }
        const groups = new Map();
        filtered.forEach(cafe => { let cat = cafe.category?.trim() || "Others"; if (!groups.has(cat)) groups.set(cat, []); groups.get(cat).push(cafe); });
        const sorted = Array.from(groups.keys()).sort((a,b)=>a.localeCompare(b));
        let html = '';
        for (let cat of sorted) {
            const list = groups.get(cat);
            let cardsHtml = '';
            list.forEach(cafe => {
                const isFav = cafe.favorite === true;
                const favIcon = isFav ? '❤️' : '🤍';
                const favActive = isFav ? 'active' : '';
                let websiteHtml = '';
                const validUrl = sanitizeUrl(cafe.website);
                if (validUrl) websiteHtml = `<div class="cafe-website"><span class="link-icon">🔗</span><a href="${escapeHtml(validUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(validUrl.length>35?validUrl.substring(0,32)+'...':validUrl)}</a></div>`;
                else if (cafe.website && cafe.website.trim()) websiteHtml = `<div class="cafe-website"><span class="link-icon">⚠️</span><span class="no-link">链接无效</span></div>`;
                else websiteHtml = `<div class="cafe-website"><span class="link-icon">🌐</span><span class="no-link">暂无官网</span></div>`;
                cardsHtml += `
                    <div class="cafe-card" data-id="${cafe.id}">
                        <div class="card-content">
                            <div class="cafe-name">${escapeHtml(cafe.name)}<span>${escapeHtml(cat)}</span></div>
                            <div class="cafe-address">${escapeHtml(cafe.address || '地址未提供')}</div>
                            <div class="cafe-desc">${escapeHtml(cafe.description || '暂无描述')}</div>
                            ${websiteHtml}
                        </div>
                        <div class="card-actions">
                            <button class="favorite-btn ${favActive}" data-id="${cafe.id}">${favIcon}</button>
                            <div class="action-buttons"><button class="delete-btn" data-id="${cafe.id}">🗑️ 移除</button></div>
                        </div>
                    </div>
                `;
            });
            html += `<div class="category-section"><div class="category-header" data-category="${escapeHtml(cat)}"><div class="category-title">${escapeHtml(cat)}</div><div class="category-count">${list.length} 家</div></div><div class="cards-scroll">${cardsHtml}</div></div>`;
        }
        categoriesContainer.innerHTML = html;
        document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); deleteCafeById(btn.getAttribute('data-id')); }));
        document.querySelectorAll('.favorite-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(btn.getAttribute('data-id')); }));
        document.querySelectorAll('.category-header').forEach(header => header.addEventListener('click', () => { const cat = header.getAttribute('data-category'); if (cat) openCategoryList(cat); }));
        attachScrollGuard();
    }

    function openCategoryList(category) {
        currentListCategory = category;
        let categoryCafes = cafes.filter(c => (c.category?.trim() || "Others") === category);
        let displayList = filterCafes(categoryCafes);
        if (displayList.length === 0) {
            listModalBody.innerHTML = `<div style="text-align:center;padding:2rem;">✨ 此分类暂无符合筛选的咖啡馆 ✨</div>`;
            listModalTitle.innerText = category;
            listModal.style.display = 'flex';
            return;
        }
        listModalTitle.innerText = `${category} · ${displayList.length}家店铺`;
        let html = '';
        displayList.forEach(cafe => {
            const isFav = cafe.favorite === true;
            const favClass = isFav ? 'active' : '';
            const favIcon = isFav ? '❤️' : '🤍';
            html += `
                <div class="list-item" data-id="${cafe.id}">
                    <div class="list-item-info">
                        <div class="list-item-name">
                            ${escapeHtml(cafe.name)}
                            <span class="list-item-cat">${escapeHtml(cafe.category || 'Others')}</span>
                        </div>
                        <div class="list-item-addr">📍 ${escapeHtml(cafe.address || '地址未提供')}</div>
                    </div>
                    <button class="list-item-fav ${favClass}" data-id="${cafe.id}" data-fav-toggle>${favIcon}</button>
                </div>
            `;
        });
        listModalBody.innerHTML = html;
        document.querySelectorAll('#listModalBody .list-item').forEach(item => {
            const id = item.getAttribute('data-id');
            item.addEventListener('click', (e) => {
                if (e.target.closest('[data-fav-toggle]')) return;
                const cafe = cafes.find(c => c.id === id);
                if (cafe) showDetailModal(cafe);
            });
        });
        document.querySelectorAll('#listModalBody .list-item-fav').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                toggleFavorite(id);
            });
        });
        listModal.style.display = 'flex';
    }

    function showDetailModal(cafe) {
        const isFav = cafe.favorite === true;
        const favIcon = isFav ? '❤️' : '🤍';
        let websiteHtml = '';
        const validUrl = sanitizeUrl(cafe.website);
        if (validUrl) websiteHtml = `<div class="cafe-website"><span class="link-icon">🔗</span><a href="${escapeHtml(validUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(validUrl)}</a></div>`;
        else if (cafe.website && cafe.website.trim()) websiteHtml = `<div class="cafe-website"><span class="link-icon">⚠️</span><span class="no-link">链接无效: ${escapeHtml(cafe.website)}</span></div>`;
        else websiteHtml = `<div class="cafe-website"><span class="link-icon">🌐</span><span class="no-link">暂无官网</span></div>`;
        detailModalBody.setAttribute('data-current-id', cafe.id);
        detailModalBody.innerHTML = `
            <div class="detail-card">
                <div class="cafe-name">
                    ${escapeHtml(cafe.name)}
                    <button class="favorite-btn ${isFav ? 'active' : ''}" id="detailFavBtn" style="font-size:1.4rem;">${favIcon}</button>
                </div>
                <div class="cafe-address">📍 ${escapeHtml(cafe.address || '地址未提供')}</div>
                <div class="cafe-desc">${escapeHtml(cafe.description || '暂无描述')}</div>
                ${websiteHtml}
                <div style="margin-top:16px; font-size:0.75rem; color:#9b7a64;">🏷️ 分类: ${escapeHtml(cafe.category || 'Others')}</div>
            </div>
        `;
        detailModal.style.display = 'flex';
        const detailFavBtn = document.getElementById('detailFavBtn');
        if (detailFavBtn) detailFavBtn.addEventListener('click', () => toggleFavorite(cafe.id, true));
    }

    // 乐观更新 + 错误回滚
    function toggleFavorite(cafeId, fromDetailRefresh = false) {
        const cafe = cafes.find(c => c.id === cafeId);
        if (!cafe) return;
        const oldValue = cafe.favorite;
        cafe.favorite = !cafe.favorite;
        renderGroupedCards();
        refreshCurrentListIfOpen();
        if (detailModal.style.display === 'flex' && !fromDetailRefresh && detailModalBody.getAttribute('data-current-id') === cafeId) {
            const favBtn = document.getElementById('detailFavBtn');
            if (favBtn) {
                favBtn.innerHTML = cafe.favorite ? '❤️' : '🤍';
                favBtn.classList.toggle('active', cafe.favorite);
            }
        }
        database.ref(`publicCafes/${cafeId}`).update({ favorite: cafe.favorite })
            .catch(err => {
                console.error(err);
                cafe.favorite = oldValue;
                renderGroupedCards();
                refreshCurrentListIfOpen();
                alert('收藏操作失败，请检查网络或 Firebase 权限');
            });
    }

    function refreshCurrentListIfOpen() {
        if (listModal.style.display === 'flex' && currentListCategory) openCategoryList(currentListCategory);
    }

    function deleteCafeById(id) {
        const cafeIndex = cafes.findIndex(c => c.id === id);
        if (cafeIndex === -1) return;
        const removed = cafes[cafeIndex];
        cafes.splice(cafeIndex, 1);
        renderGroupedCards();
        if (listModal.style.display === 'flex') refreshCurrentListIfOpen();
        if (detailModal.style.display === 'flex') detailModal.style.display = 'none';
        updateRegionOptions();
        database.ref(`publicCafes/${id}`).remove()
            .catch(err => {
                console.error(err);
                cafes.splice(cafeIndex, 0, removed);
                renderGroupedCards();
                updateRegionOptions();
                alert('删除失败，请检查网络或 Firebase 权限');
            });
    }

    function addNewCafe() {
        let name = nameInput.value.trim();
        if (!name) { alert('请填写咖啡馆名称'); return; }
        let address = addressInput.value.trim() || '地址待补充';
        let website = websiteInput.value.trim();
        let category = categoryInput.value.trim() || 'Others';
        let description = descInput.value.trim() || '一家温馨的咖啡厅';
        const newCafe = {
            id: generateId(),
            name,
            address,
            description,
            website,
            category,
            favorite: false
        };
        // 乐观更新：立即添加到本地并渲染
        cafes.unshift(newCafe);
        renderGroupedCards();
        updateRegionOptions();
        nameInput.value = '';
        addressInput.value = '';
        websiteInput.value = '';
        descInput.value = '';
        nameInput.focus();
        // 写入 Firebase
        database.ref(`publicCafes/${newCafe.id}`).set(newCafe)
            .catch(err => {
                console.error(err);
                // 回滚：移除本地添加的咖啡馆
                const idx = cafes.findIndex(c => c.id === newCafe.id);
                if (idx !== -1) cafes.splice(idx, 1);
                renderGroupedCards();
                updateRegionOptions();
                alert('添加失败，请检查网络或 Firebase 权限');
            });
    }

    function toggleShowFavorites() {
        showOnlyFavorites = !showOnlyFavorites;
        toggleFavBtn.textContent = showOnlyFavorites ? '✨ 显示全部' : '❤️ 只看收藏';
        showOnlyFavorites ? toggleFavBtn.classList.add('btn-fav-active') : toggleFavBtn.classList.remove('btn-fav-active');
        renderGroupedCards();
        if (listModal.style.display === 'flex') refreshCurrentListIfOpen();
    }

    let searchTimeout;
    function onSearchChange() {
        if (searchTimeout) clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            searchKeyword = searchKeywordInput.value;
            searchRegion = searchRegionSelect.value;
            renderGroupedCards();
            if (listModal.style.display === 'flex') refreshCurrentListIfOpen();
        }, 300);
    }
    function clearSearch() {
        searchKeywordInput.value = "";
        searchRegionSelect.value = "";
        searchKeyword = "";
        searchRegion = "";
        renderGroupedCards();
        if (listModal.style.display === 'flex') refreshCurrentListIfOpen();
    }

    function attachScrollGuard() {
        document.querySelectorAll('.cards-scroll').forEach(scrollContainer => {
            let startX = 0, startY = 0, isScrolling = false;
            scrollContainer.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                isScrolling = false;
            }, { passive: true });
            scrollContainer.addEventListener('touchmove', (e) => {
                if (!isScrolling) {
                    const deltaX = Math.abs(e.touches[0].clientX - startX);
                    const deltaY = Math.abs(e.touches[0].clientY - startY);
                    if (deltaX > 5 && deltaX > deltaY) isScrolling = true;
                }
            }, { passive: true });
            scrollContainer.addEventListener('click', (e) => {
                if (isScrolling) e.stopPropagation();
            });
        });
    }

    function setupFirebaseSync() {
        const cafesRef = database.ref('publicCafes');
        cafesRef.on('child_added', (snapshot) => {
            const newCafe = snapshot.val();
            if (!cafes.find(c => c.id === newCafe.id)) {
                cafes.push(newCafe);
                updateRegionOptions();
                renderGroupedCards();
                if (listModal.style.display === 'flex') refreshCurrentListIfOpen();
            }
        });
        cafesRef.on('child_changed', (snapshot) => {
            const updated = snapshot.val();
            const index = cafes.findIndex(c => c.id === updated.id);
            if (index !== -1) {
                cafes[index] = updated;
                updateRegionOptions();
                renderGroupedCards();
                if (listModal.style.display === 'flex') refreshCurrentListIfOpen();
                if (detailModal.style.display === 'flex' && detailModalBody.getAttribute('data-current-id') === updated.id) {
                    showDetailModal(updated);
                }
            }
        });
        cafesRef.on('child_removed', (snapshot) => {
            const removedId = snapshot.key;
            cafes = cafes.filter(c => c.id !== removedId);
            updateRegionOptions();
            renderGroupedCards();
            if (listModal.style.display === 'flex') refreshCurrentListIfOpen();
            if (detailModal.style.display === 'flex' && detailModalBody.getAttribute('data-current-id') === removedId) {
                detailModal.style.display = 'none';
            }
        });
    }

    function loadPublicData() {
        database.ref('publicCafes').once('value').then(snapshot => {
            const data = snapshot.val();
            if (data) {
                cafes = Object.values(data);
            } else {
                const defaultCafes = [
                    { id: generateId(), name: "森屿咖啡", address: "杭州市西湖区留下街道18号", description: "藏在森林里的玻璃房，手冲瑰夏香气迷人，适合周末发呆。", website: "https://www.senyucoffee.com", category: "Cafe", favorite: true },
                    { id: generateId(), name: "夜航船咖啡馆", address: "上海市徐汇区衡山路12弄", description: "复古船舱风格，特色海盐焦糖拿铁，晚间有爵士乐。", website: "https://www.nighthawkcoffee.cn", category: "Western", favorite: false },
                    { id: generateId(), name: "书虫与豆子", address: "成都市青羊区窄巷子9号", description: "独立书店+咖啡，安静阅读区，特调橙香肉桂拿铁必点。", website: "https://www.bookbean.club", category: "Japanese", favorite: true },
                    { id: generateId(), name: "泰赞冰咖", address: "广州市天河区体育东路", description: "地道泰式奶茶&咖啡，斑斓吐司配泰式冰咖绝配。", website: "https://www.thaiZan.com", category: "Thai", favorite: false },
                    { id: generateId(), name: "娘惹食堂", address: "槟城路/吉隆坡风格体验馆", description: "南洋咖啡 + 娘惹糕点，独特香料风味。", website: "https://www.nyonyacafe.my", category: "Nyonya", favorite: true }
                ];
                cafes = defaultCafes;
                const updates = {};
                defaultCafes.forEach(cafe => { updates[`publicCafes/${cafe.id}`] = cafe; });
                database.ref().update(updates);
            }
            updateRegionOptions();
            renderGroupedCards();
            setupFirebaseSync();
        }).catch(err => {
            console.error(err);
            syncIndicator.textContent = '⚠️ 连接失败，使用本地缓存';
            syncIndicator.className = 'offline-badge';
            const cached = localStorage.getItem('cafePublicCache');
            if (cached) {
                try { cafes = JSON.parse(cached); } catch(e) {}
            }
            if (!cafes.length) cafes = [];
            updateRegionOptions();
            renderGroupedCards();
        });
    }

    function initAuth() {
        auth.signInAnonymously()
            .then(() => {
                syncIndicator.textContent = '🟢 公共数据已连接';
                syncIndicator.className = 'online-badge';
                loadPublicData();
            })
            .catch((error) => {
                console.error(error);
                syncIndicator.textContent = '⚠️ 离线模式';
                syncIndicator.className = 'offline-badge';
                loadPublicData();
            });
    }

    function setupEventListeners() {
        addBtn.addEventListener('click', addNewCafe);
        toggleFavBtn.addEventListener('click', toggleShowFavorites);
        searchKeywordInput.addEventListener('input', onSearchChange);
        searchRegionSelect.addEventListener('change', onSearchChange);
        clearSearchBtn.addEventListener('click', clearSearch);
        [nameInput, addressInput, websiteInput, categoryInput].forEach(i => i.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); addNewCafe(); } }));
        descInput.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); addNewCafe(); } });
        closeListModal.addEventListener('click', () => listModal.style.display = 'none');
        closeDetailModal.addEventListener('click', () => detailModal.style.display = 'none');
        window.addEventListener('click', e => { if (e.target === listModal) listModal.style.display = 'none'; if (e.target === detailModal) detailModal.style.display = 'none'; });
    }

    function init() {
        setupEventListeners();
        initAuth();
    }
    init();
</script>
</body>
</html>
