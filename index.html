<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FEONG的咖啡厅收藏集</title>
    <!-- Font Awesome 6 (免费图标库，用于爱心和删除图标) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts 提升字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f7f5f0;
            color: #2c2a28;
            padding: 2rem 1.5rem;
        }

        /* 主容器 */
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            margin-bottom: 2rem;
            border-bottom: 3px solid #e0c3a0;
            padding-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 1rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #b97f44, #e2b281);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub {
            color: #7e6a54;
            font-weight: 500;
        }

        /* 添加表单卡片 */
        .form-card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem 1.8rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #ede3d5;
        }
        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }
        .input-group {
            flex: 1;
            min-width: 160px;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #b68b5a;
            margin-bottom: 0.3rem;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid #e7ddd0;
            border-radius: 40px;
            font-size: 0.9rem;
            background: #fffdfa;
            transition: 0.2s;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #c99e6c;
            box-shadow: 0 0 0 2px rgba(201,158,108,0.2);
        }
        .btn-primary {
            background: #c58a4a;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: #a76f38;
            transform: scale(0.97);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #d9c6b0;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: #7c5f3f;
        }
        .btn-outline:hover {
            background: #efe2d3;
        }
        .category-add {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .new-cat-input {
            flex: 1;
            min-width: 120px;
        }

        /* 分类区块 */
        .category-section {
            margin-bottom: 2.5rem;
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-left: 6px solid #c99e6c;
            padding-left: 1rem;
            margin-bottom: 1rem;
        }
        .category-title {
            font-size: 1.7rem;
            font-weight: 700;
            color: #4a3520;
            cursor: pointer;
            transition: 0.2s;
        }
        .category-title:hover {
            color: #b97f44;
            transform: translateX(4px);
        }
        .view-all-btn {
            background: none;
            border: none;
            color: #a67942;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            background: #f0e7dd;
        }
        .view-all-btn:hover {
            background: #e2d2c0;
        }

        /* 横向滚动区域 */
        .scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 1.3rem;
            padding-bottom: 0.8rem;
            scrollbar-width: thin;
        }
        .scroll-container::-webkit-scrollbar {
            height: 6px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: #e8dfd3;
            border-radius: 10px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #c99e6c;
            border-radius: 10px;
        }

        /* 大卡片样式 */
        .card {
            background: white;
            border-radius: 28px;
            width: 280px;
            flex-shrink: 0;
            padding: 1.2rem;
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            border: 1px solid #f0e2d4;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.08);
        }
        .card-name {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #3b2a1c;
            word-break: break-word;
            padding-right: 40px;
        }
        .card-link {
            font-size: 0.8rem;
            color: #c18546;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 1rem;
            word-break: break-all;
        }
        .card-link i {
            font-size: 0.75rem;
        }
        .card-link:hover {
            text-decoration: underline;
            color: #9b5f2a;
        }
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: auto;
        }
        .favorite-btn, .delete-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.1s;
            padding: 4px;
        }
        .favorite-btn {
            color: #d4af7a;
        }
        .favorite-btn.active {
            color: #e34234;
        }
        .delete-btn {
            color: #b38b6d;
            font-size: 1.3rem;
        }
        .delete-btn:hover {
            color: #c0392b;
        }
        .empty-cat-msg {
            color: #a18f78;
            padding: 1rem 0;
            font-style: italic;
        }

        /* 模态框 (全分类小卡片列表 + 详情大卡片模态框) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: #fffdf8;
            border-radius: 32px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.8rem;
            position: relative;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eedbc8;
            padding-bottom: 0.6rem;
        }
        .modal-header h2 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .close-modal {
            font-size: 1.8rem;
            cursor: pointer;
            color: #a07d56;
        }
        .small-card-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .small-card {
            background: #fef8f0;
            border-radius: 20px;
            padding: 0.9rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f0e0ce;
            transition: 0.1s;
            cursor: pointer;
        }
        .small-card:hover {
            background: #f9efE2;
        }
        .small-card-info {
            flex: 1;
        }
        .small-card-name {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 4px;
        }
        .small-card-cat {
            font-size: 0.7rem;
            color: #bc8f5a;
        }
        .small-card-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .small-fav {
            font-size: 1.4rem;
            background: none;
            border: none;
            cursor: pointer;
            color: #cfb287;
        }
        .small-fav.active {
            color: #e34234;
        }
        .detail-modal .modal-content {
            max-width: 480px;
            text-align: left;
        }
        .detail-field {
            margin: 1rem 0;
        }
        .detail-link {
            color: #bc7a3a;
            word-break: break-all;
        }
        hr {
            margin: 0.8rem 0;
            border-color: #eedbc8;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            color: #ac9a82;
            font-size: 0.75rem;
        }
        @media (max-width: 700px) {
            body { padding: 1.2rem; }
            .card { width: 260px; }
            .category-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>☕ FEONG的咖啡厅收藏集</h1>
        <div class="sub">收藏·探索·品味</div>
    </div>

    <!-- 添加新咖啡馆的表单 -->
    <div class="form-card">
        <div class="form-grid">
            <div class="input-group">
                <label>咖啡厅名称</label>
                <input type="text" id="cafeName" placeholder="例: 墨尔本精品咖啡馆" autocomplete="off">
            </div>
            <div class="input-group">
                <label>官网/主页链接</label>
                <input type="url" id="cafeUrl" placeholder="https://..." autocomplete="off">
            </div>
            <div class="input-group">
                <label>分类</label>
                <select id="cafeCategory"></select>
            </div>
            <div class="input-group category-add">
                <div class="new-cat-input">
                    <input type="text" id="newCategoryName" placeholder="新类别名称">
                </div>
                <button type="button" class="btn-outline" id="addCategoryBtn">+ 添加类别</button>
            </div>
            <button class="btn-primary" id="addCafeBtn"><i class="fas fa-plus-circle"></i> 加入收藏集</button>
        </div>
    </div>

    <!-- 动态分类区块将注入到这里 -->
    <div id="categoriesContainer"></div>
    <footer>❤️ 点击爱心收藏 · 每个卡片都可单独移除 · 点分类标题查看完整小卡片列表</footer>
</div>

<!-- 模态框：展示某分类下全部小卡片 -->
<div id="categoryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalCategoryTitle">分类名称</h2>
            <span class="close-modal" id="closeModalBtn">&times;</span>
        </div>
        <div id="modalSmallCardList" class="small-card-list">加载中...</div>
    </div>
</div>

<!-- 详情模态框：点击小卡片后展示完整大卡片资料 -->
<div id="detailModal" class="modal detail-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📄 咖啡馆档案</h2>
            <span class="close-modal" id="closeDetailModalBtn">&times;</span>
        </div>
        <div id="detailContent"></div>
    </div>
</div>

<script>
    // ----------------------------- Firebase 配置 -----------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyA3sD8nLU9-4QOuS4ZFIuUXMn_yilFr5Oc",
        authDomain: "cafe-c55f9.firebaseapp.com",
        databaseURL: "https://cafe-c55f9-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "cafe-c55f9",
        storageBucket: "cafe-c55f9.firebasestorage.app",
        messagingSenderId: "328042543743",
        appId: "1:328042543743:web:0fc175a3aadc7c5a639d4a"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const cafesRef = database.ref("cafes");

    // ----------------------------- 全局变量 ---------------------------------
    let allCafes = [];         // 存储 { id, name, url, category, favorited }
    let globalCategories = []; // 动态类别列表 (预置13类 + 用户新增)
    let currentModalCategory = null;   // 用于重绘后自动恢复模态框
    let currentDetailCafe = null;

    // 预置13个基础类别 (顺序自定义)
    const DEFAULT_CATEGORIES = ["Bar", "Cafe", "Chinese", "Dessert", "Fine Dine", "Hatyai", "Japanese", "Kopitiam", "Korean", "Nyonya", "Thai", "Western", "Others"];

    // 辅助函数: 合并并去重类别 (基于现有咖啡馆 + 基础类别 + 本地存储的新类别)
    function computeGlobalCategories() {
        let catsSet = new Set(DEFAULT_CATEGORIES);
        // 加入现有咖啡馆中的类别
        allCafes.forEach(cafe => { if(cafe.category) catsSet.add(cafe.category); });
        // 从 localStorage 读取用户新增的类别 (持久化)
        const storedExtra = localStorage.getItem("extraCategories");
        if(storedExtra) {
            try {
                const extraArr = JSON.parse(storedExtra);
                extraArr.forEach(c => catsSet.add(c));
            } catch(e) {}
        }
        // 排序: 保持基础类别在前，然后按字母排其他
        let sorted = [...catsSet].sort((a,b) => {
            let aIdx = DEFAULT_CATEGORIES.indexOf(a);
            let bIdx = DEFAULT_CATEGORIES.indexOf(b);
            if(aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
            if(aIdx !== -1) return -1;
            if(bIdx !== -1) return 1;
            return a.localeCompare(b);
        });
        globalCategories = sorted;
        return globalCategories;
    }

    // 保存额外类别到 localStorage
    function saveExtraCategories() {
        const extra = globalCategories.filter(c => !DEFAULT_CATEGORIES.includes(c));
        localStorage.setItem("extraCategories", JSON.stringify(extra));
    }

    // 渲染下拉框
    function renderCategorySelect() {
        const select = document.getElementById("cafeCategory");
        if(!select) return;
        select.innerHTML = "";
        globalCategories.forEach(cat => {
            const option = document.createElement("option");
            option.value = cat;
            option.textContent = cat;
            select.appendChild(option);
        });
    }

    // 核心渲染: 根据类别分组展示横向滚动大卡片区块
    function renderMainView() {
        const container = document.getElementById("categoriesContainer");
        if(!container) return;
        container.innerHTML = "";
        // 没有类别时提示
        if(globalCategories.length === 0) {
            container.innerHTML = "<div style='padding:2rem;text-align:center'>暂无分类，请添加类别或咖啡馆</div>";
            return;
        }
        // 按分类分组
        const grouped = new Map();
        globalCategories.forEach(cat => { grouped.set(cat, []); });
        allCafes.forEach(cafe => {
            const cat = cafe.category;
            if(grouped.has(cat)) grouped.get(cat).push(cafe);
            else grouped.set(cat, [cafe]); // 如果新类别未在global中，但一般同步
        });
        // 为每个分类创建区块
        for(let category of globalCategories) {
            const cafesInCat = grouped.get(category) || [];
            const sectionDiv = document.createElement("div");
            sectionDiv.className = "category-section";
            sectionDiv.setAttribute("data-category", category);
            // header
            sectionDiv.innerHTML = `
                <div class="category-header">
                    <div class="category-title" data-cat="${category}">${category}</div>
                    <button class="view-all-btn" data-cat="${category}">📋 查看全部 (${cafesInCat.length})</button>
                </div>
                <div class="scroll-container" id="scroll-${category.replace(/[^a-zA-Z0-9]/g, '_')}"></div>
            `;
            container.appendChild(sectionDiv);
            const scrollDiv = sectionDiv.querySelector(".scroll-container");
            if(cafesInCat.length === 0) {
                scrollDiv.innerHTML = `<div class="empty-cat-msg">✨ 暂无咖啡厅，点击上方添加 ✨</div>`;
            } else {
                cafesInCat.forEach(cafe => {
                    const card = createCardElement(cafe);
                    scrollDiv.appendChild(card);
                });
            }
            // 绑定标题点击事件(查看该分类全部小卡片)
            const titleDiv = sectionDiv.querySelector(".category-title");
            const viewBtn = sectionDiv.querySelector(".view-all-btn");
            const openModalFunc = () => openCategoryModal(category);
            titleDiv.addEventListener("click", openModalFunc);
            viewBtn.addEventListener("click", openModalFunc);
        }
        // 如果有之前打开的模态框类别，重新打开它（确保数据同步后依然显示）
        if(currentModalCategory) {
            openCategoryModal(currentModalCategory);
        }
    }

    // 创建大卡片DOM (横向滚动使用)
    function createCardElement(cafe) {
        const cardDiv = document.createElement("div");
        cardDiv.className = "card";
        const isFav = cafe.favorited === true;
        cardDiv.innerHTML = `
            <div class="card-name">${escapeHtml(cafe.name)}</div>
            <a href="${escapeHtml(cafe.url)}" target="_blank" class="card-link"><i class="fas fa-external-link-alt"></i> ${escapeHtml(cafe.url.length>35 ? cafe.url.substring(0,32)+'...' : cafe.url)}</a>
            <div class="card-actions">
                <button class="favorite-btn ${isFav ? 'active' : ''}" data-id="${cafe.id}"><i class="fas fa-heart"></i></button>
                <button class="delete-btn" data-id="${cafe.id}"><i class="fas fa-trash-alt"></i></button>
            </div>
        `;
        const favBtn = cardDiv.querySelector(".favorite-btn");
        const delBtn = cardDiv.querySelector(".delete-btn");
        favBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleFavorite(cafe.id, !cafe.favorited);
        });
        delBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if(confirm(`确定移除「${cafe.name}」吗？`)) {
                deleteCafe(cafe.id);
            }
        });
        return cardDiv;
    }

    // 切换收藏状态
    async function toggleFavorite(id, newState) {
        await cafesRef.child(id).update({ favorited: newState });
    }

    async function deleteCafe(id) {
        await cafesRef.child(id).remove();
    }

    // 添加新咖啡馆
    async function addCafe(name, url, category) {
        if(!name.trim()) { alert("请输入咖啡厅名称"); return false; }
        if(!url.trim()) { alert("请输入有效链接"); return false; }
        if(!url.startsWith("http")) { alert("链接需以 http:// 或 https:// 开头"); return false; }
        const newCafe = {
            name: name.trim(),
            url: url.trim(),
            category: category,
            favorited: false,
            createdAt: Date.now()
        };
        await cafesRef.push(newCafe);
        return true;
    }

    // 添加新类别 (全局)
    function addNewCategory(catName) {
        let newCat = catName.trim();
        if(newCat === "") { alert("请输入类别名称"); return false; }
        if(globalCategories.includes(newCat)) { alert("该类别已存在"); return false; }
        globalCategories.push(newCat);
        // 重新计算保存额外类别
        saveExtraCategories();
        renderCategorySelect();
        renderMainView();  // 刷新主界面
        return true;
    }

    // 打开分类模态框 (展示该分类下所有咖啡馆的小卡片)
    function openCategoryModal(category) {
        currentModalCategory = category;
        const modal = document.getElementById("categoryModal");
        const modalTitle = document.getElementById("modalCategoryTitle");
        const listContainer = document.getElementById("modalSmallCardList");
        modalTitle.innerText = `📌 ${category} · 全部咖啡馆`;
        const cafesInCat = allCafes.filter(c => c.category === category);
        if(cafesInCat.length === 0) {
            listContainer.innerHTML = `<div style="padding:2rem;text-align:center">暂无咖啡馆，快去添加吧 ☕</div>`;
        } else {
            listContainer.innerHTML = "";
            cafesInCat.forEach(cafe => {
                const smallCard = createSmallCardElement(cafe);
                listContainer.appendChild(smallCard);
            });
        }
        modal.style.display = "flex";
    }

    // 创建小卡片 (一行行展示，右侧爱心，点击卡片区域查看大卡片详情)
    function createSmallCardElement(cafe) {
        const div = document.createElement("div");
        div.className = "small-card";
        const isFav = cafe.favorited === true;
        div.innerHTML = `
            <div class="small-card-info">
                <div class="small-card-name">${escapeHtml(cafe.name)}</div>
                <div class="small-card-cat">${escapeHtml(cafe.category)}</div>
            </div>
            <div class="small-card-actions">
                <button class="small-fav ${isFav ? 'active' : ''}" data-id="${cafe.id}"><i class="fas fa-heart"></i></button>
            </div>
        `;
        // 点击小卡片主体 (除去爱心按钮区) 显示详情大卡片
        const infoArea = div.querySelector(".small-card-info");
        infoArea.style.cursor = "pointer";
        infoArea.addEventListener("click", (e) => {
            e.stopPropagation();
            showDetailModal(cafe);
        });
        // 爱心按钮独立
        const favSmallBtn = div.querySelector(".small-fav");
        favSmallBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleFavorite(cafe.id, !cafe.favorited);
        });
        return div;
    }

    // 显示完整资料大卡片模态框 (点击小卡片后)
    function showDetailModal(cafe) {
        const modal = document.getElementById("detailModal");
        const detailContainer = document.getElementById("detailContent");
        const isFav = cafe.favorited === true;
        detailContainer.innerHTML = `
            <div class="detail-field"><strong>🏷️ 名称</strong><br>${escapeHtml(cafe.name)}</div>
            <div class="detail-field"><strong>📂 分类</strong><br>${escapeHtml(cafe.category)}</div>
            <div class="detail-field"><strong>🔗 主页链接</strong><br><a href="${escapeHtml(cafe.url)}" target="_blank" class="detail-link">${escapeHtml(cafe.url)}</a></div>
            <div class="detail-field"><strong>❤️ 收藏状态</strong><br>${isFav ? '已收藏' : '未收藏'}</div>
            <hr>
            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 0.5rem;">
                <button id="detailFavBtn" class="btn-outline" style="background:#f0e2d4;"><i class="fas fa-heart"></i> ${isFav ? '取消收藏' : '收藏'}</button>
                <button id="detailDelBtn" class="btn-outline" style="color:#b1624b;"><i class="fas fa-trash-alt"></i> 移除卡片</button>
            </div>
        `;
        modal.style.display = "flex";
        const favDetailBtn = document.getElementById("detailFavBtn");
        const delDetailBtn = document.getElementById("detailDelBtn");
        favDetailBtn.addEventListener("click", () => {
            toggleFavorite(cafe.id, !cafe.favorited);
            modal.style.display = "none";
        });
        delDetailBtn.addEventListener("click", () => {
            if(confirm(`永久删除「${cafe.name}」？`)) {
                deleteCafe(cafe.id);
                modal.style.display = "none";
            }
        });
    }

    // 监听Firebase实时数据变化
    function subscribeCafes() {
        cafesRef.on("value", (snapshot) => {
            const data = snapshot.val();
            const cafesArray = [];
            if(data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    cafesArray.push({
                        id: key,
                        name: item.name || "未命名",
                        url: item.url || "#",
                        category: item.category || "Others",
                        favorited: item.favorited === true
                    });
                });
            }
            allCafes = cafesArray;
            // 更新全局类别 (基于现有cafes+预设+localstorage)
            computeGlobalCategories();
            // 重新渲染下拉框 (确保新类别)
            renderCategorySelect();
            // 刷新主界面 (若当前有模态框打开，内部会根据currentModalCategory重开)
            renderMainView();
        });
    }

    // 添加示例数据 (仅当数据库为空时写入几个例子)
    async function seedExampleData() {
        const snapshot = await cafesRef.once("value");
        if(snapshot.exists()) return;
        const examples = [
            { name: "蓝瓶咖啡", url: "https://bluebottlecoffee.com", category: "Cafe", favorited: true },
            { name: "福来甜品屋", url: "https://example.com/dessert", category: "Dessert", favorited: false },
            { name: "槟城娘惹餐厅", url: "https://example.com/nyonya", category: "Nyonya", favorited: true },
            { name: "合艾泰式咖啡", url: "https://example.com/hatyai", category: "Hatyai", favorited: false },
            { name: "日式喫茶店", url: "https://example.com/japanese", category: "Japanese", favorited: true },
            { name: "老南洋 Kopitiam", url: "https://example.com/kopitiam", category: "Kopitiam", favorited: false }
        ];
        for(let ex of examples) {
            await cafesRef.push(ex);
        }
    }

    // 辅助防XSS
    function escapeHtml(str) {
        if(!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 初始化类别下拉和额外类别加载
    function initCategories() {
        const stored = localStorage.getItem("extraCategories");
        let extra = [];
        if(stored) try { extra = JSON.parse(stored); } catch(e) {}
        globalCategories = [...new Set([...DEFAULT_CATEGORIES, ...extra])];
        renderCategorySelect();
    }

    // 事件绑定
    function bindEvents() {
        document.getElementById("addCafeBtn").addEventListener("click", async () => {
            const name = document.getElementById("cafeName").value;
            const url = document.getElementById("cafeUrl").value;
            const category = document.getElementById("cafeCategory").value;
            await addCafe(name, url, category);
            document.getElementById("cafeName").value = "";
            document.getElementById("cafeUrl").value = "";
        });
        document.getElementById("addCategoryBtn").addEventListener("click", () => {
            const newCatInput = document.getElementById("newCategoryName");
            const catVal = newCatInput.value;
            if(addNewCategory(catVal)) {
                newCatInput.value = "";
            }
        });
        // 关闭模态框事件
        const modal = document.getElementById("categoryModal");
        const closeBtn = document.getElementById("closeModalBtn");
        const detailModal = document.getElementById("detailModal");
        const closeDetail = document.getElementById("closeDetailModalBtn");
        closeBtn.onclick = () => { modal.style.display = "none"; currentModalCategory = null; };
        closeDetail.onclick = () => { detailModal.style.display = "none"; };
        window.onclick = (e) => {
            if(e.target === modal) { modal.style.display = "none"; currentModalCategory = null; }
            if(e.target === detailModal) detailModal.style.display = "none";
        };
    }

    // 启动
    async function init() {
        initCategories();
        bindEvents();
        await seedExampleData();
        subscribeCafes();   // 开始实时监听
    }
    init();
</script>
</body>
</html>
