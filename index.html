<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FEONG的咖啡厅收藏集</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f7f5f0;
            color: #2c2a28;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            margin-bottom: 1.5rem;
            border-bottom: 3px solid #e0c3a0;
            padding-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 1rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #b97f44, #e2b281);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        /* 副标题已移除 */

        /* 搜索 & 筛选栏 */
        .search-bar {
            background: white;
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid #ede3d5;
        }
        .search-input-group {
            flex: 3;
            min-width: 180px;
            display: flex;
            align-items: center;
            background: #fefcf8;
            border-radius: 40px;
            border: 1px solid #e7ddd0;
            padding: 0.2rem 1rem;
        }
        .search-input-group i {
            color: #c99e6c;
            margin-right: 8px;
        }
        .search-input-group input {
            border: none;
            background: transparent;
            padding: 0.6rem 0;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }
        .filter-group {
            flex: 1;
            min-width: 150px;
        }
        .filter-group select {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 40px;
            border: 1px solid #e7ddd0;
            background: #fefcf8;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }
        .clear-filter {
            background: none;
            border: none;
            color: #b78f5e;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            transition: 0.1s;
        }
        .clear-filter:hover {
            background: #f0e7dd;
        }

        /* 添加表单卡片 */
        .form-card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem 1.8rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #ede3d5;
        }
        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }
        .input-group {
            flex: 1;
            min-width: 150px;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #b68b5a;
            margin-bottom: 0.3rem;
        }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid #e7ddd0;
            border-radius: 20px;
            font-size: 0.9rem;
            background: #fffdfa;
            transition: 0.2s;
        }
        .input-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            outline: none;
            border-color: #c99e6c;
            box-shadow: 0 0 0 2px rgba(201,158,108,0.2);
        }
        /* 新类别融入区域：让分类下拉框与其他框同宽，添加类别控件紧凑排列 */
        .category-combo {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            width: 100%;
        }
        .category-combo select {
            flex: 2;
            min-width: 120px;
        }
        .category-combo .new-cat-input {
            flex: 1;
            min-width: 100px;
        }
        .category-combo .btn-outline {
            flex-shrink: 0;
            padding: 0.6rem 1rem;
            white-space: nowrap;
        }
        .btn-primary {
            background: #c58a4a;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: #a76f38;
            transform: scale(0.97);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #d9c6b0;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: #7c5f3f;
        }
        .btn-outline:hover {
            background: #efe2d3;
        }

        /* 分类区块 */
        .category-section {
            margin-bottom: 2.5rem;
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-left: 6px solid #c99e6c;
            padding-left: 1rem;
            margin-bottom: 1rem;
        }
        .category-title {
            font-size: 1.7rem;
            font-weight: 700;
            color: #4a3520;
            cursor: pointer;
            transition: 0.2s;
        }
        .category-title:hover {
            color: #b97f44;
            transform: translateX(4px);
        }
        .view-all-btn {
            background: none;
            border: none;
            color: #a67942;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            background: #f0e7dd;
        }
        .view-all-btn:hover {
            background: #e2d2c0;
        }

        /* 横向滚动区域 */
        .scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 1.3rem;
            padding-bottom: 0.8rem;
            scrollbar-width: thin;
        }
        .scroll-container::-webkit-scrollbar {
            height: 6px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: #e8dfd3;
            border-radius: 10px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #c99e6c;
            border-radius: 10px;
        }

        /* 大卡片样式 */
        .card {
            background: white;
            border-radius: 28px;
            width: 300px;
            flex-shrink: 0;
            padding: 1.2rem;
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            border: 1px solid #f0e2d4;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.08);
        }
        .card-name {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #3b2a1c;
            padding-right: 40px;
        }
        .card-region {
            font-size: 0.7rem;
            color: #b48b54;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 0.4rem;
        }
        .card-desc {
            font-size: 0.75rem;
            color: #6f5e4a;
            margin: 0.5rem 0;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-link {
            font-size: 0.75rem;
            color: #c18546;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin: 0.5rem 0 0.8rem 0;
            word-break: break-all;
        }
        .card-link i {
            font-size: 0.7rem;
        }
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: auto;
        }
        .favorite-btn, .delete-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.1s;
            padding: 4px;
        }
        .favorite-btn {
            color: #d4af7a;
        }
        .favorite-btn.active {
            color: #e34234;
        }
        .delete-btn {
            color: #b38b6d;
            font-size: 1.3rem;
        }
        .delete-btn:hover {
            color: #c0392b;
        }
        .empty-cat-msg {
            color: #a18f78;
            padding: 1rem 0;
            font-style: italic;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: #fffdf8;
            border-radius: 32px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.8rem;
            position: relative;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eedbc8;
            padding-bottom: 0.6rem;
        }
        .modal-header h2 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .close-modal {
            font-size: 1.8rem;
            cursor: pointer;
            color: #a07d56;
        }
        .small-card-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .small-card {
            background: #fef8f0;
            border-radius: 20px;
            padding: 0.9rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f0e0ce;
            transition: 0.1s;
            cursor: pointer;
        }
        .small-card:hover {
            background: #f9efe2;
        }
        .small-card-info {
            flex: 1;
        }
        .small-card-name {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 4px;
        }
        .small-card-meta {
            font-size: 0.7rem;
            color: #b48b54;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .small-card-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .small-fav {
            font-size: 1.4rem;
            background: none;
            border: none;
            cursor: pointer;
            color: #cfb287;
        }
        .small-fav.active {
            color: #e34234;
        }
        .detail-modal .modal-content {
            max-width: 500px;
        }
        .detail-field {
            margin: 1rem 0;
        }
        .detail-link {
            color: #bc7a3a;
            word-break: break-all;
        }
        hr {
            margin: 0.8rem 0;
            border-color: #eedbc8;
        }
        /* footer 已移除 */
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>☕ FEONG的咖啡厅收藏集</h1>
        <!-- 原副标题已删除 -->
    </div>

    <!-- 搜索+地区筛选栏 -->
    <div class="search-bar">
        <div class="search-input-group">
            <i class="fas fa-search"></i>
            <input type="text" id="searchKeyword" placeholder="搜索咖啡厅名称、地区或简介...">
        </div>
        <div class="filter-group">
            <select id="regionFilter">
                <option value="">🌍 所有地区</option>
            </select>
        </div>
        <button class="clear-filter" id="clearFiltersBtn"><i class="fas fa-eraser"></i> 清除筛选</button>
    </div>

    <!-- 添加咖啡馆表单 (移除示例文字，修改标签) -->
    <div class="form-card">
        <div class="form-grid">
            <div class="input-group">
                <label>咖啡厅名称 *</label>
                <input type="text" id="cafeName" placeholder="" autocomplete="off">
            </div>
            <div class="input-group">
                <label>地区</label>
                <input type="text" id="cafeRegion" placeholder="" autocomplete="off">
            </div>
            <div class="input-group">
                <label>链接 *</label>
                <input type="url" id="cafeUrl" placeholder="https://..." autocomplete="off">
            </div>
            <!-- 分类框 + 添加新类别融合区域 -->
            <div class="input-group">
                <label>分类</label>
                <div class="category-combo">
                    <select id="cafeCategory"></select>
                    <input type="text" id="newCategoryName" class="new-cat-input" placeholder="新类别名称">
                    <button type="button" class="btn-outline" id="addCategoryBtn">+ 添加</button>
                </div>
            </div>
            <div class="input-group" style="min-width: 200px; flex:2;">
                <label>简介</label>
                <textarea id="cafeDesc" rows="2" placeholder=""></textarea>
            </div>
            <button class="btn-primary" id="addCafeBtn"><i class="fas fa-plus-circle"></i> 加入收藏集</button>
        </div>
    </div>

    <!-- 动态分类区块 -->
    <div id="categoriesContainer"></div>
    <!-- footer 已移除 -->
</div>

<!-- 分类全部小卡片模态框 -->
<div id="categoryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalCategoryTitle">分类名称</h2>
            <span class="close-modal" id="closeModalBtn">&times;</span>
        </div>
        <div id="modalSmallCardList" class="small-card-list">加载中...</div>
    </div>
</div>

<!-- 详情模态框 -->
<div id="detailModal" class="modal detail-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📄 咖啡馆档案</h2>
            <span class="close-modal" id="closeDetailModalBtn">&times;</span>
        </div>
        <div id="detailContent"></div>
    </div>
</div>

<script>
    // Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyA3sD8nLU9-4QOuS4ZFIuUXMn_yilFr5Oc",
        authDomain: "cafe-c55f9.firebaseapp.com",
        databaseURL: "https://cafe-c55f9-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "cafe-c55f9",
        storageBucket: "cafe-c55f9.firebasestorage.app",
        messagingSenderId: "328042543743",
        appId: "1:328042543743:web:0fc175a3aadc7c5a639d4a"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const cafesRef = database.ref("cafes");

    // 全局变量
    let allCafes = [];
    let globalCategories = [];
    let currentModalCategory = null;
    let searchKeyword = "";
    let selectedRegion = "";
    let regionSet = new Set();

    const DEFAULT_CATEGORIES = ["Bar", "Cafe", "Chinese", "Dessert", "Fine Dine", "Hatyai", "Japanese", "Kopitiam", "Korean", "Nyonya", "Thai", "Western", "Others"];

    function computeGlobalCategories() {
        let catsSet = new Set(DEFAULT_CATEGORIES);
        allCafes.forEach(cafe => { if(cafe.category) catsSet.add(cafe.category); });
        const storedExtra = localStorage.getItem("extraCategories");
        if(storedExtra) {
            try {
                JSON.parse(storedExtra).forEach(c => catsSet.add(c));
            } catch(e) {}
        }
        globalCategories = [...catsSet].sort((a,b) => {
            let aIdx = DEFAULT_CATEGORIES.indexOf(a);
            let bIdx = DEFAULT_CATEGORIES.indexOf(b);
            if(aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
            if(aIdx !== -1) return -1;
            if(bIdx !== -1) return 1;
            return a.localeCompare(b);
        });
        return globalCategories;
    }

    function saveExtraCategories() {
        const extra = globalCategories.filter(c => !DEFAULT_CATEGORIES.includes(c));
        localStorage.setItem("extraCategories", JSON.stringify(extra));
    }

    function updateRegionFilterDropdown() {
        regionSet.clear();
        allCafes.forEach(cafe => {
            if(cafe.region && cafe.region.trim() !== "") regionSet.add(cafe.region.trim());
        });
        const select = document.getElementById("regionFilter");
        const currentVal = select.value;
        select.innerHTML = '<option value="">🌍 所有地区</option>';
        Array.from(regionSet).sort().forEach(region => {
            const option = document.createElement("option");
            option.value = region;
            option.textContent = region;
            select.appendChild(option);
        });
        if(currentVal && regionSet.has(currentVal)) select.value = currentVal;
        else if(currentVal === "") select.value = "";
        else select.value = "";
        selectedRegion = select.value;
    }

    function getFilteredCafes() {
        let filtered = [...allCafes];
        if(searchKeyword.trim() !== "") {
            const kw = searchKeyword.trim().toLowerCase();
            filtered = filtered.filter(cafe => 
                cafe.name.toLowerCase().includes(kw) ||
                (cafe.region && cafe.region.toLowerCase().includes(kw)) ||
                (cafe.description && cafe.description.toLowerCase().includes(kw))
            );
        }
        if(selectedRegion && selectedRegion !== "") {
            filtered = filtered.filter(cafe => cafe.region === selectedRegion);
        }
        return filtered;
    }

    function renderMainView() {
        const container = document.getElementById("categoriesContainer");
        if(!container) return;
        container.innerHTML = "";
        const filteredCafes = getFilteredCafes();
        const grouped = new Map();
        globalCategories.forEach(cat => { grouped.set(cat, []); });
        filteredCafes.forEach(cafe => {
            const cat = cafe.category;
            if(grouped.has(cat)) grouped.get(cat).push(cafe);
            else grouped.set(cat, [cafe]);
        });
        for(let category of globalCategories) {
            const cafesInCat = grouped.get(category) || [];
            if(cafesInCat.length === 0) continue;
            const sectionDiv = document.createElement("div");
            sectionDiv.className = "category-section";
            sectionDiv.setAttribute("data-category", category);
            sectionDiv.innerHTML = `
                <div class="category-header">
                    <div class="category-title" data-cat="${category}">${category}</div>
                    <button class="view-all-btn" data-cat="${category}">📋 查看全部 (${cafesInCat.length})</button>
                </div>
                <div class="scroll-container" id="scroll-${category.replace(/[^a-zA-Z0-9]/g, '_')}"></div>
            `;
            container.appendChild(sectionDiv);
            const scrollDiv = sectionDiv.querySelector(".scroll-container");
            cafesInCat.forEach(cafe => {
                const card = createCardElement(cafe);
                scrollDiv.appendChild(card);
            });
            const titleDiv = sectionDiv.querySelector(".category-title");
            const viewBtn = sectionDiv.querySelector(".view-all-btn");
            const openModalFunc = () => openCategoryModal(category);
            titleDiv.addEventListener("click", openModalFunc);
            viewBtn.addEventListener("click", openModalFunc);
        }
        if(container.children.length === 0) {
            container.innerHTML = `<div style="padding:2rem; text-align:center; background:#fef4e8; border-radius:30px;">🔍 没有找到匹配的咖啡厅，试试其他关键词或地区～</div>`;
        }
        if(currentModalCategory) {
            openCategoryModal(currentModalCategory);
        }
    }

    // 创建大卡片，按钮文字改为 "🔗链接"
    function createCardElement(cafe) {
        const cardDiv = document.createElement("div");
        cardDiv.className = "card";
        const isFav = cafe.favorited === true;
        const regionHtml = cafe.region ? `<div class="card-region"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(cafe.region)}</div>` : '';
        const descHtml = cafe.description ? `<div class="card-desc">${escapeHtml(cafe.description.length>70 ? cafe.description.substring(0,67)+'...' : cafe.description)}</div>` : '';
        cardDiv.innerHTML = `
            <div class="card-name">${escapeHtml(cafe.name)}</div>
            ${regionHtml}
            ${descHtml}
            <a href="${escapeHtml(cafe.url)}" target="_blank" class="card-link"><i class="fas fa-external-link-alt"></i> 🔗链接</a>
            <div class="card-actions">
                <button class="favorite-btn ${isFav ? 'active' : ''}" data-id="${cafe.id}"><i class="fas fa-heart"></i></button>
                <button class="delete-btn" data-id="${cafe.id}"><i class="fas fa-trash-alt"></i></button>
            </div>
        `;
        const favBtn = cardDiv.querySelector(".favorite-btn");
        const delBtn = cardDiv.querySelector(".delete-btn");
        favBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleFavorite(cafe.id, !cafe.favorited);
        });
        delBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if(confirm(`确定移除「${cafe.name}」吗？`)) deleteCafe(cafe.id);
        });
        return cardDiv;
    }

    async function toggleFavorite(id, newState) {
        await cafesRef.child(id).update({ favorited: newState });
    }
    async function deleteCafe(id) {
        await cafesRef.child(id).remove();
    }

    async function addCafe(name, url, category, region, description) {
        if(!name.trim()) { alert("请输入咖啡厅名称"); return false; }
        if(!url.trim()) { alert("请输入有效链接"); return false; }
        if(!url.startsWith("http")) { alert("链接需以 http:// 或 https:// 开头"); return false; }
        const newCafe = {
            name: name.trim(),
            url: url.trim(),
            category: category,
            favorited: false,
            region: region.trim() || "",
            description: description.trim() || "",
            createdAt: Date.now()
        };
        await cafesRef.push(newCafe);
        return true;
    }

    function addNewCategory(catName) {
        let newCat = catName.trim();
        if(newCat === "") { alert("请输入类别名称"); return false; }
        if(globalCategories.includes(newCat)) { alert("该类别已存在"); return false; }
        globalCategories.push(newCat);
        saveExtraCategories();
        renderCategorySelect();
        renderMainView();
        return true;
    }

    function renderCategorySelect() {
        const select = document.getElementById("cafeCategory");
        if(!select) return;
        select.innerHTML = "";
        globalCategories.forEach(cat => {
            const option = document.createElement("option");
            option.value = cat;
            option.textContent = cat;
            select.appendChild(option);
        });
    }

    function openCategoryModal(category) {
        currentModalCategory = category;
        const modal = document.getElementById("categoryModal");
        const modalTitle = document.getElementById("modalCategoryTitle");
        const listContainer = document.getElementById("modalSmallCardList");
        modalTitle.innerText = `📌 ${category} · 全部咖啡馆`;
        const cafesInCat = allCafes.filter(c => c.category === category);
        if(cafesInCat.length === 0) {
            listContainer.innerHTML = `<div style="padding:2rem;text-align:center">暂无咖啡馆</div>`;
        } else {
            listContainer.innerHTML = "";
            cafesInCat.forEach(cafe => {
                const smallCard = createSmallCardElement(cafe);
                listContainer.appendChild(smallCard);
            });
        }
        modal.style.display = "flex";
    }

    function createSmallCardElement(cafe) {
        const div = document.createElement("div");
        div.className = "small-card";
        const isFav = cafe.favorited === true;
        div.innerHTML = `
            <div class="small-card-info">
                <div class="small-card-name">${escapeHtml(cafe.name)}</div>
                <div class="small-card-meta">
                    ${cafe.region ? `<span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(cafe.region)}</span>` : ''}
                    <span><i class="fas fa-tag"></i> ${escapeHtml(cafe.category)}</span>
                </div>
            </div>
            <div class="small-card-actions">
                <button class="small-fav ${isFav ? 'active' : ''}" data-id="${cafe.id}"><i class="fas fa-heart"></i></button>
            </div>
        `;
        const infoArea = div.querySelector(".small-card-info");
        infoArea.style.cursor = "pointer";
        infoArea.addEventListener("click", (e) => {
            e.stopPropagation();
            showDetailModal(cafe);
        });
        const favSmallBtn = div.querySelector(".small-fav");
        favSmallBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleFavorite(cafe.id, !cafe.favorited);
        });
        return div;
    }

    function showDetailModal(cafe) {
        const modal = document.getElementById("detailModal");
        const detailContainer = document.getElementById("detailContent");
        const isFav = cafe.favorited === true;
        detailContainer.innerHTML = `
            <div class="detail-field"><strong>🏷️ 名称</strong><br>${escapeHtml(cafe.name)}</div>
            <div class="detail-field"><strong>📍 地区</strong><br>${cafe.region ? escapeHtml(cafe.region) : '未填写'}</div>
            <div class="detail-field"><strong>📂 分类</strong><br>${escapeHtml(cafe.category)}</div>
            <div class="detail-field"><strong>📝 简介</strong><br>${cafe.description ? escapeHtml(cafe.description) : '暂无简介'}</div>
            <div class="detail-field"><strong>🔗 链接</strong><br><a href="${escapeHtml(cafe.url)}" target="_blank" class="detail-link">${escapeHtml(cafe.url)}</a></div>
            <div class="detail-field"><strong>❤️ 收藏</strong><br>${isFav ? '已收藏' : '未收藏'}</div>
            <hr>
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button id="detailFavBtn" class="btn-outline"><i class="fas fa-heart"></i> ${isFav ? '取消收藏' : '收藏'}</button>
                <button id="detailDelBtn" class="btn-outline" style="color:#b1624b;"><i class="fas fa-trash-alt"></i> 移除</button>
            </div>
        `;
        modal.style.display = "flex";
        document.getElementById("detailFavBtn").addEventListener("click", () => {
            toggleFavorite(cafe.id, !cafe.favorited);
            modal.style.display = "none";
        });
        document.getElementById("detailDelBtn").addEventListener("click", () => {
            if(confirm(`删除「${cafe.name}」？`)) {
                deleteCafe(cafe.id);
                modal.style.display = "none";
            }
        });
    }

    function subscribeCafes() {
        cafesRef.on("value", (snapshot) => {
            const data = snapshot.val();
            const cafesArray = [];
            if(data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    cafesArray.push({
                        id: key,
                        name: item.name || "未命名",
                        url: item.url || "#",
                        category: item.category || "Others",
                        favorited: item.favorited === true,
                        region: item.region || "",
                        description: item.description || ""
                    });
                });
            }
            allCafes = cafesArray;
            computeGlobalCategories();
            updateRegionFilterDropdown();
            renderCategorySelect();
            renderMainView();
        });
    }

    async function seedExampleData() {
        const snapshot = await cafesRef.once("value");
        if(snapshot.exists()) return;
        const examples = [
            { name: "蓝瓶咖啡", url: "https://bluebottlecoffee.com", category: "Cafe", favorited: true, region: "东京·涩谷", description: "精品咖啡领航者，手冲与冷萃闻名，极简美学空间。" },
            { name: "福来甜品屋", url: "https://example.com/dessert", category: "Dessert", favorited: false, region: "槟城", description: "传统马来甜点+创意西式蛋糕，椰糖系列必尝。" },
            { name: "槟城娘惹餐厅", url: "https://example.com/nyonya", category: "Nyonya", favorited: true, region: "槟城乔治市", description: "正宗娘惹菜，叻沙与小金杯，复古峇峇娘惹装潢。" },
            { name: "合艾泰式咖啡", url: "https://example.com/hatyai", category: "Hatyai", favorited: false, region: "合艾", description: "泰南风味咖啡，搭配斑斓甜品，悠闲度假氛围。" },
            { name: "喫茶 夜雾", url: "https://example.com/japanese", category: "Japanese", favorited: true, region: "京都", description: "日式深烘，昭和复古喫茶店，布丁与拿铁绝配。" },
            { name: "老南洋 Kopitiam", url: "https://example.com/kopitiam", category: "Kopitiam", favorited: false, region: "吉隆坡茨厂街", description: "传统海南咖啡、咖椰吐司，半熟蛋，地道南洋早餐。" }
        ];
        for(let ex of examples) {
            await cafesRef.push(ex);
        }
    }

    function bindSearchEvents() {
        const searchInput = document.getElementById("searchKeyword");
        const regionSelect = document.getElementById("regionFilter");
        const clearBtn = document.getElementById("clearFiltersBtn");
        const updateFilters = () => {
            searchKeyword = searchInput.value;
            selectedRegion = regionSelect.value;
            renderMainView();
        };
        searchInput.addEventListener("input", updateFilters);
        regionSelect.addEventListener("change", updateFilters);
        clearBtn.addEventListener("click", () => {
            searchInput.value = "";
            regionSelect.value = "";
            searchKeyword = "";
            selectedRegion = "";
            renderMainView();
        });
    }

    function bindEvents() {
        document.getElementById("addCafeBtn").addEventListener("click", async () => {
            const name = document.getElementById("cafeName").value;
            const url = document.getElementById("cafeUrl").value;
            const category = document.getElementById("cafeCategory").value;
            const region = document.getElementById("cafeRegion").value;
            const description = document.getElementById("cafeDesc").value;
            await addCafe(name, url, category, region, description);
            document.getElementById("cafeName").value = "";
            document.getElementById("cafeRegion").value = "";
            document.getElementById("cafeUrl").value = "";
            document.getElementById("cafeDesc").value = "";
        });
        document.getElementById("addCategoryBtn").addEventListener("click", () => {
            const newCatInput = document.getElementById("newCategoryName");
            if(addNewCategory(newCatInput.value)) newCatInput.value = "";
        });
        const modal = document.getElementById("categoryModal");
        const closeModal = document.getElementById("closeModalBtn");
        const detailModal = document.getElementById("detailModal");
        const closeDetail = document.getElementById("closeDetailModalBtn");
        closeModal.onclick = () => { modal.style.display = "none"; currentModalCategory = null; };
        closeDetail.onclick = () => { detailModal.style.display = "none"; };
        window.onclick = (e) => {
            if(e.target === modal) { modal.style.display = "none"; currentModalCategory = null; }
            if(e.target === detailModal) detailModal.style.display = "none";
        };
    }

    function escapeHtml(str) {
        if(!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    async function init() {
        computeGlobalCategories();
        renderCategorySelect();
        bindEvents();
        bindSearchEvents();
        await seedExampleData();
        subscribeCafes();
    }
    init();
</script>
</body>
</html>
